<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joelhood Acting Master Class</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ── ROOT ─────────────────────────────────────────────────── */
:root {
  --bg:          #111318;
  --bg2:         #181c23;
  --bg3:         #1e222b;
  --surface:     #23283300;
  --border:      #2a2f3a;
  --gold:        #c9a84c;
  --gold-dim:    #8a6d2a;
  --gold-bright: #e8c76a;
  --cream:       #f0ead8;
  --cream-dim:   #a09880;
  --white:       #faf8f3;
  --muted:       #5a6070;
  --green:       #3a7d5a;
  --green-dim:   #1e3d2d;
  --red:         #8b3a3a;
  --font-script: 'Courier Prime', 'Courier New', monospace;
  --font-body:   'Cormorant Garamond', Georgia, serif;
  --transition:  200ms ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: var(--font-body);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── LOADING ──────────────────────────────────────────────── */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
  z-index: 9999;
  transition: opacity 0.6s ease;
}
#loading.fade-out { opacity: 0; pointer-events: none; }
.loading-mark {
  font-family: var(--font-script);
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--gold);
  text-transform: uppercase;
  animation: pulse 2s ease-in-out infinite;
}
.loading-bar {
  width: 160px; height: 1px;
  background: var(--border);
  position: relative; overflow: hidden;
}
.loading-bar::after {
  content: '';
  position: absolute; inset-block: 0; left: -100%;
  width: 100%; background: var(--gold);
  animation: slide 1.4s ease-in-out infinite;
}
@keyframes slide { to { left: 100%; } }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

/* ── LAYOUT ───────────────────────────────────────────────── */
#app { display: none; min-height: 100vh; }
#app.visible { display: flex; flex-direction: column; }

header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.header-inner {
  max-width: 900px; margin: 0 auto;
  display: flex; align-items: center;
  justify-content: space-between;
  height: 56px;
}
.logo {
  font-family: var(--font-script);
  font-size: 10px; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase;
}
.student-name {
  font-family: var(--font-body);
  font-size: 13px; color: var(--cream-dim);
  font-style: italic;
}

/* ── PHASE PROGRESS ───────────────────────────────────────── */
.progress-bar {
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  background: var(--bg2);
}
.progress-inner {
  max-width: 900px; margin: 0 auto;
  display: flex; align-items: center; gap: 8px;
}
.phase-dot {
  display: flex; align-items: center; gap: 6px;
}
.phase-dot-circle {
  width: 8px; height: 8px; border-radius: 50%;
  border: 1px solid var(--muted);
  background: transparent;
  transition: var(--transition);
  flex-shrink: 0;
}
.phase-dot-circle.active {
  background: var(--gold);
  border-color: var(--gold);
  box-shadow: 0 0 8px rgba(201,168,76,0.4);
}
.phase-dot-circle.complete {
  background: var(--green);
  border-color: var(--green);
}
.phase-dot-label {
  font-family: var(--font-script);
  font-size: 9px; letter-spacing: 1.5px;
  color: var(--muted); text-transform: uppercase;
  white-space: nowrap;
}
.phase-dot.active .phase-dot-label { color: var(--gold); }
.phase-dot.complete .phase-dot-label { color: var(--green); }

.phase-divider {
  flex: 1; height: 1px;
  background: var(--border);
}

/* Lesson segments within active phase */
.lesson-segments {
  display: flex; gap: 3px; align-items: center;
}
.lesson-seg {
  width: 16px; height: 3px;
  background: var(--border); border-radius: 2px;
  transition: var(--transition);
}
.lesson-seg.done { background: var(--green); }
.lesson-seg.current { background: var(--gold); }

/* ── MAIN CONTENT ─────────────────────────────────────────── */
main {
  flex: 1;
  max-width: 900px; margin: 0 auto;
  width: 100%; padding: 48px 24px 120px;
}

/* ── LESSON HEADER ────────────────────────────────────────── */
.lesson-header {
  margin-bottom: 48px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
}
.lesson-phase-label {
  font-family: var(--font-script);
  font-size: 10px; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase;
  margin-bottom: 12px;
}
.lesson-title {
  font-family: var(--font-body);
  font-size: clamp(28px, 5vw, 42px);
  font-weight: 300;
  color: var(--white);
  line-height: 1.2;
  margin-bottom: 24px;
}
.epigraph {
  border-left: 2px solid var(--gold-dim);
  padding: 16px 24px;
  margin-top: 24px;
}
.epigraph-quote {
  font-family: var(--font-body);
  font-size: 15px; font-style: italic;
  color: var(--cream-dim); line-height: 1.7;
  margin-bottom: 8px;
}
.epigraph-attr {
  font-family: var(--font-script);
  font-size: 10px; letter-spacing: 2px;
  color: var(--gold-dim); text-transform: uppercase;
}

/* ── ACT HEADER ───────────────────────────────────────────── */
.act-header {
  margin: 48px 0 32px;
  display: flex; align-items: center; gap: 16px;
}
.act-number {
  font-family: var(--font-script);
  font-size: 9px; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase;
  white-space: nowrap;
}
.act-title-text {
  font-family: var(--font-script);
  font-size: 10px; letter-spacing: 2px;
  color: var(--cream-dim); text-transform: uppercase;
}
.act-rule {
  flex: 1; height: 1px; background: var(--border);
}

/* ── SCREENPLAY BLOCKS ────────────────────────────────────── */
.screenplay { font-family: var(--font-script); line-height: 1.8; }

.block-slug {
  display: block;
  font-size: 13px; font-weight: 700;
  color: var(--cream); letter-spacing: 0.5px;
  margin: 24px 0 12px;
  text-transform: uppercase;
}

.block-action {
  display: block;
  font-size: 14px; color: var(--cream-dim);
  margin: 8px 0; max-width: 580px;
}

.block-action-italic {
  display: block;
  font-size: 14px; color: var(--cream-dim);
  font-style: italic; margin: 8px 0;
  max-width: 580px;
}

.block-character {
  display: block;
  font-size: 13px; font-weight: 700;
  color: var(--cream); letter-spacing: 0.5px;
  text-transform: uppercase;
  margin: 20px auto 0;
  text-align: center;
  max-width: 420px;
}

.block-character-vo {
  display: block;
  font-size: 13px; font-weight: 700;
  color: var(--cream); letter-spacing: 0.5px;
  text-transform: uppercase;
  margin: 20px auto 0;
  text-align: center;
  max-width: 420px;
}
.block-character-vo::after { content: ' (V.O.)'; font-weight: 400; }

.block-paren {
  display: block;
  font-size: 13px; color: var(--muted);
  font-style: italic;
  text-align: center; max-width: 420px;
  margin: 0 auto;
}

.block-dialogue {
  display: block;
  font-size: 14px; color: var(--cream);
  max-width: 420px; margin: 0 auto;
  text-align: center;
  padding: 0 16px;
}

/* ── DIRECT ADDRESS ───────────────────────────────────────── */
.direct-address-section {
  margin: 64px 0 48px;
  padding: 40px;
  border: 1px solid var(--border);
  background: var(--bg2);
  position: relative;
}
.direct-address-section::before {
  content: 'BROTHER JACK — DIRECT ADDRESS';
  position: absolute; top: -1px; left: 40px;
  background: var(--bg);
  padding: 0 12px;
  font-family: var(--font-script);
  font-size: 9px; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase;
}
.da-intro {
  font-family: var(--font-body);
  font-size: 13px; font-style: italic;
  color: var(--muted); margin-bottom: 24px;
}
.block-address {
  display: block;
  font-family: var(--font-body);
  font-size: 15px; font-style: italic;
  color: var(--cream-dim); line-height: 1.8;
  margin-bottom: 16px;
  padding-left: 24px;
  border-left: 1px solid var(--border);
}

/* ── REQUIREMENT SECTION ──────────────────────────────────── */
.requirement-section {
  margin-top: 64px;
  padding: 40px;
  border: 1px solid var(--gold-dim);
  background: var(--bg2);
  position: relative;
}
.requirement-section::before {
  content: 'LESSON REQUIREMENT';
  position: absolute; top: -1px; left: 40px;
  background: var(--bg);
  padding: 0 12px;
  font-family: var(--font-script);
  font-size: 9px; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase;
}
.req-hashtag {
  font-family: var(--font-script);
  font-size: 18px; color: var(--gold);
  margin-bottom: 16px; font-weight: 700;
}
.req-prompt {
  font-family: var(--font-body);
  font-size: 16px; color: var(--cream);
  line-height: 1.7; margin-bottom: 32px;
}

/* Form */
.req-form { display: flex; flex-direction: column; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label {
  font-family: var(--font-script);
  font-size: 10px; letter-spacing: 2px;
  color: var(--muted); text-transform: uppercase;
}
.form-input {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--cream);
  font-family: var(--font-script);
  font-size: 14px; padding: 12px 16px;
  border-radius: 2px;
  transition: border-color var(--transition);
  outline: none;
}
.form-input:focus { border-color: var(--gold); }
.form-input::placeholder { color: var(--muted); }

.submit-btn {
  align-self: flex-start;
  background: var(--gold);
  color: var(--bg);
  font-family: var(--font-script);
  font-size: 11px; letter-spacing: 3px;
  text-transform: uppercase;
  padding: 14px 32px;
  border: none; border-radius: 2px;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
  margin-top: 8px;
}
.submit-btn:hover { background: var(--gold-bright); transform: translateY(-1px); }
.submit-btn:active { transform: translateY(0); }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.req-feedback {
  font-family: var(--font-script);
  font-size: 13px; padding: 12px 16px;
  border-radius: 2px; display: none;
}
.req-feedback.success {
  background: var(--green-dim);
  border: 1px solid var(--green);
  color: #7ec89a; display: block;
}
.req-feedback.error {
  background: rgba(139,58,58,0.2);
  border: 1px solid var(--red);
  color: #e08080; display: block;
}

/* Already complete */
.req-complete {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 0;
}
.req-complete-mark {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--green);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: white; flex-shrink: 0;
}
.req-complete-text {
  font-family: var(--font-script);
  font-size: 13px; color: var(--cream-dim);
}

/* ── PHASE GATE ───────────────────────────────────────────── */
#phase-gate {
  max-width: 600px; margin: 80px auto;
  text-align: center; padding: 0 24px;
}
.gate-icon {
  font-size: 40px; margin-bottom: 24px; display: block;
  filter: grayscale(0.3);
}
.gate-title {
  font-family: var(--font-body);
  font-size: 32px; font-weight: 300;
  color: var(--white); margin-bottom: 16px;
}
.gate-sub {
  font-family: var(--font-body);
  font-size: 16px; font-style: italic;
  color: var(--cream-dim); line-height: 1.7;
  margin-bottom: 40px;
}
.gate-price {
  font-family: var(--font-script);
  font-size: 13px; letter-spacing: 2px;
  color: var(--gold); text-transform: uppercase;
  margin-bottom: 8px;
}
.gate-amount {
  font-family: var(--font-body);
  font-size: 48px; font-weight: 600;
  color: var(--white); line-height: 1;
  margin-bottom: 4px;
}
.gate-currency {
  font-family: var(--font-script);
  font-size: 12px; color: var(--muted);
  margin-bottom: 40px;
}
.gate-instructions {
  font-family: var(--font-body);
  font-size: 15px; color: var(--cream-dim);
  line-height: 1.8; text-align: left;
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 24px 28px; margin-bottom: 32px;
}
.gate-instructions strong {
  color: var(--gold); font-weight: 600;
}

/* ── CURRICULUM COMPLETE ──────────────────────────────────── */
#curriculum-complete {
  max-width: 600px; margin: 80px auto;
  text-align: center; padding: 0 24px;
}
.complete-title {
  font-family: var(--font-body);
  font-size: 36px; font-weight: 300;
  color: var(--white); margin-bottom: 24px;
  line-height: 1.2;
}
.complete-closes {
  font-family: var(--font-body);
  font-size: 15px; font-style: italic;
  color: var(--cream-dim); line-height: 2.2;
  margin-bottom: 40px;
}
.complete-final {
  font-family: var(--font-script);
  font-size: 11px; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase;
  line-height: 2;
}

/* ── ERROR STATE ──────────────────────────────────────────── */
#error-state {
  max-width: 480px; margin: 120px auto;
  text-align: center; padding: 0 24px;
}
.error-title {
  font-family: var(--font-body);
  font-size: 24px; font-weight: 300;
  color: var(--cream); margin-bottom: 12px;
}
.error-msg {
  font-family: var(--font-script);
  font-size: 13px; color: var(--muted);
  margin-bottom: 32px;
}

/* ── NEXT LESSON PANEL ────────────────────────────────────── */
.next-lesson-panel {
  margin-top: 48px; padding: 32px;
  border: 1px solid var(--border);
  background: var(--bg2);
  display: none;
}
.next-lesson-panel.visible { display: block; }
.next-label {
  font-family: var(--font-script);
  font-size: 9px; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase;
  margin-bottom: 12px;
}
.next-title {
  font-family: var(--font-body);
  font-size: 20px; font-weight: 300;
  color: var(--white); margin-bottom: 20px;
}
.next-btn {
  display: inline-block;
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: var(--font-script);
  font-size: 11px; letter-spacing: 3px;
  text-transform: uppercase;
  padding: 12px 28px;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
}
.next-btn:hover {
  background: var(--gold); color: var(--bg);
}

/* ── FADE IN ──────────────────────────────────────────────── */
.fade-in {
  animation: fadeIn 0.5s ease forwards;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── SCROLLBAR ────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media (max-width: 640px) {
  main { padding: 32px 16px 80px; }
  .direct-address-section,
  .requirement-section { padding: 28px 20px; }
  .block-character, .block-character-vo,
  .block-paren, .block-dialogue { max-width: 100%; }
  .submit-btn { width: 100%; text-align: center; }
  .progress-inner { gap: 4px; }
  .phase-dot-label { display: none; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="loading-mark">Joelhood Pictures</div>
  <div class="loading-bar"></div>
</div>

<!-- APP -->
<div id="app">

  <header>
    <div class="header-inner">
      <div class="logo">Joelhood · Acting Master Class</div>
      <div class="student-name" id="student-name-display"></div>
    </div>
  </header>

  <!-- Phase progress -->
  <div class="progress-bar" id="progress-bar" style="display:none;">
    <div class="progress-inner" id="progress-inner"></div>
  </div>

  <!-- Main content area -->
  <main id="main-content"></main>

</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const API      = 'https://acting-masterclass.joelhoodpictures.workers.dev';
const LESSONS_BASE = './lessons'; // relative path in GitHub Pages repo

// Phase metadata
const PHASES = {
  0: { name: 'Orientation',          lessons: [0] },
  1: { name: 'Phase One — The Interior',   lessons: [1,2,3,4,5] },
  2: { name: 'Phase Two — The Instrument', lessons: [0,1,2,3,4] },
  3: { name: 'Phase Three — The Text',     lessons: [1,2,3,4,5] },
  4: { name: 'Phase Four — The World',     lessons: [1,2,3,4,5,6] },
};

const PHASE_PRICES = { 1:299, 2:399, 3:399, 4:499 };

// ── STATE ─────────────────────────────────────────────────────
let STATE = {
  token: null,
  student: null,
  lessonData: null,
  currentPhase: 0,
  currentLesson: 0,
};

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search);
  STATE.token  = params.get('token') || '';

  if (!STATE.token) {
    showError('No access token found.', 'Please use the link from your email.');
    hideLoading();
    return;
  }

  try {
    const progress = await api('/progress', { token: STATE.token });
    if (!progress.ok) {
      showError('Access denied.', progress.error || 'Your link may be invalid.');
      hideLoading();
      return;
    }

    STATE.student = progress;
    STATE.currentPhase  = Number(progress.currentPhase);
    STATE.currentLesson = Number(progress.currentLesson);

    document.getElementById('student-name-display').textContent =
      progress.name || '';

    // Check if this is a specific lesson request
    const reqPhase  = params.get('phase');
    const reqLesson = params.get('lesson');
    if (reqPhase !== null && reqLesson !== null) {
      STATE.currentPhase  = Number(reqPhase);
      STATE.currentLesson = Number(reqLesson);
    }

    // Check phase access
    const paidKey = `p${STATE.currentPhase}Paid`;
    const hasAccess = STATE.currentPhase === 0 || progress[paidKey] === true;

    if (!hasAccess) {
      renderPhaseGate(STATE.currentPhase);
      hideLoading();
      showApp();
      return;
    }

    // Load lesson
    await loadLesson(STATE.currentPhase, STATE.currentLesson);
    hideLoading();
    showApp();

  } catch (err) {
    showError('Could not load your lesson.', err.message);
    hideLoading();
  }
}

// ── API ───────────────────────────────────────────────────────
async function api(path, params = {}) {
  const url = new URL(API + path);
  for (const [k,v] of Object.entries(params)) {
    url.searchParams.set(k, v);
  }
  const res = await fetch(url.toString(), {
    headers: { 'X-Token': STATE.token || '' }
  });
  return res.json();
}

async function apiPost(path, body = {}) {
  const res = await fetch(API + path, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Token': STATE.token || '',
    },
    body: JSON.stringify(body),
  });
  return res.json();
}

// ── LESSON LOADER ─────────────────────────────────────────────
async function loadLesson(phase, lesson) {
  const id  = `P${phase}L${lesson}`;
  const url = `${LESSONS_BASE}/${id}.json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Lesson ${id} not found.`);
  STATE.lessonData = await res.json();
  renderLesson(STATE.lessonData);
  renderProgress();
}

// ── PROGRESS BAR ──────────────────────────────────────────────
function renderProgress() {
  const bar  = document.getElementById('progress-bar');
  const inner = document.getElementById('progress-inner');
  bar.style.display = 'block';
  inner.innerHTML = '';

  const done = parseDone(STATE.student.lessonsDone);

  Object.entries(PHASES).forEach(([ph, cfg], idx) => {
    const phNum = Number(ph);
    const isActive   = phNum === STATE.currentPhase;
    const isComplete = cfg.lessons.every(l => done.has(`P${ph}L${l}`));

    // Divider between phases
    if (idx > 0) {
      const div = document.createElement('div');
      div.className = 'phase-divider';
      inner.appendChild(div);
    }

    const dot = document.createElement('div');
    dot.className = 'phase-dot' +
      (isActive ? ' active' : '') +
      (isComplete ? ' complete' : '');

    const circle = document.createElement('div');
    circle.className = 'phase-dot-circle' +
      (isActive ? ' active' : '') +
      (isComplete ? ' complete' : '');

    const label = document.createElement('div');
    label.className = 'phase-dot-label';
    label.textContent = ph === '0' ? 'Intro' : `P${ph}`;

    dot.appendChild(circle);
    dot.appendChild(label);

    // If active phase — show lesson segments
    if (isActive) {
      const segs = document.createElement('div');
      segs.className = 'lesson-segments';
      cfg.lessons.forEach(l => {
        const seg = document.createElement('div');
        seg.className = 'lesson-seg' +
          (l === STATE.currentLesson ? ' current' : '') +
          (done.has(`P${ph}L${l}`) ? ' done' : '');
        segs.appendChild(seg);
      });
      dot.appendChild(segs);
    }

    inner.appendChild(dot);
  });
}

function parseDone(str) {
  if (!str) return new Set();
  return new Set(String(str).split(',').map(s => s.trim()).filter(Boolean));
}

// ── LESSON RENDERER ───────────────────────────────────────────
function renderLesson(data) {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  // Header
  const hdr = el('div', 'lesson-header fade-in');
  hdr.appendChild(el('div', 'lesson-phase-label', data.phase_name));
  hdr.appendChild(el('div', 'lesson-title', data.title));

  if (data.epigraph) {
    const epi = el('div', 'epigraph');
    epi.appendChild(el('div', 'epigraph-quote', `"${data.epigraph.quote}"`));
    epi.appendChild(el('div', 'epigraph-attr', `— ${data.epigraph.attribution}`));
    hdr.appendChild(epi);
  }
  main.appendChild(hdr);

  // Acts
  const screenplay = el('div', 'screenplay fade-in');
  (data.acts || []).forEach(act => {
    const ah = el('div', 'act-header');
    ah.appendChild(el('div', 'act-number', `Act ${act.number}`));
    ah.appendChild(el('div', 'act-rule'));
    ah.appendChild(el('div', 'act-title-text', act.title));
    screenplay.appendChild(ah);

    (act.blocks || []).forEach(block => {
      screenplay.appendChild(renderBlock(block));
    });
  });
  main.appendChild(screenplay);

  // Direct address
  if (data.direct_address) {
    const da = el('div', 'direct-address-section fade-in');
    da.appendChild(el('div', 'da-intro', data.direct_address.intro));
    (data.direct_address.blocks || []).forEach(block => {
      da.appendChild(renderBlock(block));
    });
    main.appendChild(da);
  }

  // Pondering (if present)
  if (data.pondering) {
    const pSection = el('div', 'direct-address-section fade-in');
    pSection.style.setProperty('--before-content', '"THE PONDERING"');
    pSection.setAttribute('data-label', 'THE PONDERING');
    const style = document.createElement('style');
    style.textContent = `[data-label="THE PONDERING"]::before { content: "THE PONDERING"; }`;
    pSection.appendChild(style);
    if (data.pondering.slug) {
      pSection.appendChild(renderBlock({ type: 'slug', text: data.pondering.slug }));
    }
    (data.pondering.blocks || []).forEach(block => {
      pSection.appendChild(renderBlock(block));
    });
    main.appendChild(pSection);
  }

  // Requirement
  renderRequirement(data, main);
}

function renderBlock(block) {
  const d = el('div', `block-${block.type}`);
  d.textContent = block.text || '';
  return d;
}

function el(tag, className = '', text = '') {
  const e = document.createElement(tag);
  if (className) e.className = className;
  if (text)      e.textContent = text;
  return e;
}

// ── REQUIREMENT ───────────────────────────────────────────────
function renderRequirement(data, parent) {
  const req = data.requirement;
  if (!req) return;

  const done = parseDone(STATE.student.lessonsDone);
  const id   = `P${data.phase}L${data.lesson}`;
  const isComplete = done.has(id);

  const section = el('div', 'requirement-section fade-in');

  section.appendChild(el('div', 'req-hashtag', req.hashtag));
  section.appendChild(el('div', 'req-prompt', req.prompt));

  if (isComplete) {
    const comp = el('div', 'req-complete');
    const mark = el('div', 'req-complete-mark', '✓');
    const txt  = el('div', 'req-complete-text', 'Requirement submitted. Lesson complete.');
    comp.appendChild(mark);
    comp.appendChild(txt);
    section.appendChild(comp);

    // Show next lesson button
    const nextPanel = buildNextPanel(data);
    if (nextPanel) section.appendChild(nextPanel);

  } else {
    // Form
    const form = el('div', 'req-form');

    const urlGroup = el('div', 'form-group');
    urlGroup.appendChild(el('label', 'form-label', 'Post URL — Link to your published post'));
    const urlInput = document.createElement('input');
    urlInput.className = 'form-input';
    urlInput.type = 'url';
    urlInput.placeholder = 'https://instagram.com/p/...';
    urlInput.id = 'req-url';
    urlGroup.appendChild(urlInput);
    form.appendChild(urlGroup);

    const tagGroup = el('div', 'form-group');
    tagGroup.appendChild(el('label', 'form-label', `Hashtag — Type the exact hashtag from your post`));
    const tagInput = document.createElement('input');
    tagInput.className = 'form-input';
    tagInput.type = 'text';
    tagInput.placeholder = req.hashtag;
    tagInput.id = 'req-hashtag';
    tagGroup.appendChild(tagInput);
    form.appendChild(tagGroup);

    const feedback = el('div', 'req-feedback');
    feedback.id = 'req-feedback';
    form.appendChild(feedback);

    const btn = document.createElement('button');
    btn.className = 'submit-btn';
    btn.textContent = 'Submit Requirement';
    btn.onclick = () => submitRequirement(data, urlInput, tagInput, btn, feedback);
    form.appendChild(btn);

    section.appendChild(form);
  }

  parent.appendChild(section);
}

async function submitRequirement(data, urlInput, tagInput, btn, feedback) {
  const postUrl = urlInput.value.trim();
  const hashtag = tagInput.value.trim();
  const expected = data.requirement.hashtag.toLowerCase();

  feedback.className = 'req-feedback';
  feedback.style.display = 'none';

  if (!postUrl || !postUrl.startsWith('http')) {
    showFeedback(feedback, 'error', 'Please enter a valid post URL starting with http.');
    return;
  }
  if (!hashtag) {
    showFeedback(feedback, 'error', 'Please enter the hashtag from your post.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Verifying...';

  try {
    const result = await apiPost('/submit', {
      phase:   data.phase,
      lesson:  data.lesson,
      postUrl,
      hashtag,
    });

    if (result.ok) {
      showFeedback(feedback, 'success', '✓ Requirement verified. Well done.');
      btn.style.display = 'none';
      urlInput.disabled = true;
      tagInput.disabled = true;

      // Update local done state
      const id = `P${data.phase}L${data.lesson}`;
      const curr = STATE.student.lessonsDone || '';
      STATE.student.lessonsDone = curr ? `${curr},${id}` : id;

      if (result.curriculumComplete) {
        setTimeout(() => renderCurriculumComplete(), 1500);
        return;
      }

      if (result.phaseComplete) {
        setTimeout(() => renderPhaseGate(data.phase + 1), 1500);
        return;
      }

      // Show next lesson
      if (result.nextLesson !== null && result.nextLesson !== undefined) {
        setTimeout(() => {
          const nextPanel = buildNextPanel(data);
          if (nextPanel) {
            const section = document.querySelector('.requirement-section');
            if (section) section.appendChild(nextPanel);
            nextPanel.classList.add('visible');
          }
        }, 800);
      }

    } else {
      showFeedback(feedback, 'error', result.error || 'Submission failed. Check your post URL and hashtag.');
      btn.disabled = false;
      btn.textContent = 'Submit Requirement';
    }
  } catch (err) {
    showFeedback(feedback, 'error', 'Network error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Submit Requirement';
  }
}

function showFeedback(el, type, msg) {
  el.className = `req-feedback ${type}`;
  el.textContent = msg;
  el.style.display = 'block';
}

function buildNextPanel(data) {
  const phase  = data.phase;
  const lesson = data.lesson;
  const phaseCfg = PHASES[phase];
  if (!phaseCfg) return null;

  const lessons = phaseCfg.lessons;
  const idx     = lessons.indexOf(Number(lesson));
  if (idx < 0 || idx >= lessons.length - 1) return null;

  const nextLesson = lessons[idx + 1];
  const nextId     = `P${phase}L${nextLesson}`;

  const panel = el('div', 'next-lesson-panel');
  panel.appendChild(el('div', 'next-label', 'Next Lesson'));
  panel.appendChild(el('div', 'next-title', `Lesson ${nextLesson}`));

  const btn = document.createElement('button');
  btn.className = 'next-btn';
  btn.textContent = 'Continue →';
  btn.onclick = async () => {
    STATE.currentLesson = nextLesson;
    const main = document.getElementById('main-content');
    main.innerHTML = '';
    await loadLesson(phase, nextLesson);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  panel.appendChild(btn);
  return panel;
}

// ── PHASE GATE ────────────────────────────────────────────────
function renderPhaseGate(nextPhaseNum) {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  const price  = PHASE_PRICES[nextPhaseNum] || 0;
  const pName  = PHASES[nextPhaseNum] ? PHASES[nextPhaseNum].name : `Phase ${nextPhaseNum}`;
  const prevName = PHASES[nextPhaseNum - 1] ? PHASES[nextPhaseNum - 1].name : '';

  const gate = el('div', '');
  gate.id = 'phase-gate';

  gate.appendChild(el('span', 'gate-icon', '🔥'));
  gate.appendChild(el('div', 'gate-title', prevName ? `${prevName} complete.` : 'Phase complete.'));
  gate.appendChild(el('div', 'gate-sub',
    `You have reached the gate. ${pName} is waiting.\nPayment is required to continue.`
  ));

  gate.appendChild(el('div', 'gate-price', 'Investment'));
  gate.appendChild(el('div', 'gate-amount', price.toLocaleString()));
  gate.appendChild(el('div', 'gate-currency', 'Zambian Kwacha (ZMW)'));

  const instructions = el('div', 'gate-instructions');
  instructions.innerHTML = `
    <strong>How to unlock ${pName}:</strong><br><br>
    1. Send <strong>K${price.toLocaleString()} ZMW</strong> via MoMo to Joelhood Pictures.<br>
    2. Use your name as the payment reference.<br>
    3. Once your payment is confirmed, your next phase will unlock automatically and you will receive an email.<br><br>
    <strong>Contact:</strong> joelhoodpictures@gmail.com · +260977858275
  `;
  gate.appendChild(instructions);

  main.appendChild(gate);
}

// ── CURRICULUM COMPLETE ───────────────────────────────────────
function renderCurriculumComplete() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';

  const div = el('div', 'fade-in');
  div.id = 'curriculum-complete';

  div.appendChild(el('div', 'complete-title', 'The fire is yours.'));

  const closes = el('div', 'complete-closes');
  closes.innerHTML = `
    To the Apprentice who stayed.<br>
    To the Apprentice who looked.<br>
    To the Apprentice who stayed in the silence.<br>
    <strong>To the Apprentice who began.</strong>
  `;
  div.appendChild(closes);

  const final = el('div', 'complete-final');
  final.innerHTML = `
    Stand up.<br>
    And begin.
  `;
  div.appendChild(final);

  main.appendChild(div);
}

// ── ERROR STATE ───────────────────────────────────────────────
function showError(title, msg) {
  const app  = document.getElementById('app');
  const main = document.getElementById('main-content');
  app.classList.add('visible');

  const err = el('div', 'fade-in');
  err.id = 'error-state';
  err.style.margin = '120px auto';
  err.style.textAlign = 'center';
  err.style.padding = '0 24px';
  err.style.maxWidth = '480px';

  err.appendChild(el('div', 'error-title', title));
  err.appendChild(el('div', 'error-msg', msg));

  const contact = el('div', '');
  contact.style.cssText = 'font-family:var(--font-script);font-size:12px;color:var(--muted);';
  contact.textContent = 'Contact: joelhoodpictures@gmail.com';
  err.appendChild(contact);

  main.appendChild(err);
}

// ── SHOW/HIDE ─────────────────────────────────────────────────
function hideLoading() {
  const loading = document.getElementById('loading');
  loading.classList.add('fade-out');
  setTimeout(() => loading.style.display = 'none', 600);
}

function showApp() {
  document.getElementById('app').classList.add('visible');
}

// ── RUN ───────────────────────────────────────────────────────
init();
</script>
